<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDDC 2026</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #339cff;
    --blue-bright: #5bb8ff;
    --blue-dark: #1a7ae6;
    --muted: rgba(91, 184, 255, 0.75);
  }

  body {
    min-height: 100vh;
    background: #080c18;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
    padding-top: 20px;
    padding-bottom: 40px;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(51, 156, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(51, 156, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, 40px); }
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none;
    z-index: 100;
  }

  .container {
    position: relative;
    z-index: 10;
    width: 90%;
    max-width: 320px;
    padding: 16px;
  }

  .terminal-header {
    font-family: 'JetBrains Mono', monospace;
    color: var(--blue);
    font-size: 11px;
    margin-bottom: 8px;
    opacity: 0.8;
    letter-spacing: 1px;
    font-weight: 700;
  }

  .card {
    background: rgba(10, 16, 35, 0.9);
    border: 1px solid rgba(51, 156, 255, 0.2);
    border-radius: 12px;
    padding: 18px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(51,156,255,0.06), 0 20px 60px rgba(0,0,0,0.5);
    margin-bottom: 12px;
  }

  /* ── TITLE ── */
  .title-section {
    text-align: center;
    padding: 4px 0;
  }

  .title-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
  }

  /* ── COUNTDOWN ── */
  .countdown-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .countdown-row {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 2px;
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cd-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 16px rgba(91, 184, 255, 0.25);
  }

  .cd-sep {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--muted);
    line-height: 1;
    margin: 0 1px;
  }

  .cd-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── KEY DATES ── */
  .event-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .event-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .event-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
  }

  .event-row + .event-row {
    border-top: 1px solid rgba(51, 156, 255, 0.08);
  }

  .event-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .event-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }

  /* ── CHALLENGES ── */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .challenge-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .challenge-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 14px;
    background: rgba(51, 156, 255, 0.04);
    border: 1px solid rgba(51, 156, 255, 0.12);
    border-radius: 10px;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }

  .challenge-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--blue);
    min-width: 32px;
    text-align: center;
    opacity: 0.6;
  }

  .challenge-info { flex: 1; }

  .challenge-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }

  .challenge-arrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #5bb8ff;
  }

  /* ── CTA BUTTON ── */
  .cta-wrap {
    margin-top: 10px;
    position: relative;
    z-index: 10;
  }

  .cta-btn {
    display: block;
    width: 100%;
    padding: 7px 12px;
    background: transparent;
    border: 1px solid rgba(51, 156, 255, 0.2);
    border-radius: 6px;
    color: var(--blue-bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
  }

  /* ── PARTICLES ── */
  .particle {
    position: fixed;
    width: 2px; height: 2px;
    background: var(--blue-bright);
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-20px); opacity: 0; }
  }
</style>
</head>
<body>

<div id="particles"></div>

<div class="container">
  <div class="terminal-header">// CDDC_PORTAL v68.83.84.65</div>

  <!-- Title -->
  <div class="card" style="text-align: center;">
    <div class="title-section">
      <div class="title-sub">CYBER DEFENDERS DISCOVERY CAMP</div>
    </div>
  </div>

  <!-- Countdown -->
  <div class="card">
    <div class="countdown-label">> REGISTRATION_CLOSES</div>
    <div class="countdown-row">
      <div class="cd-unit">
        <div class="cd-value" id="days">--</div>
        <div class="cd-label">Days</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-value" id="hours">--</div>
        <div class="cd-label">Hrs</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-value" id="mins">--</div>
        <div class="cd-label">Min</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-value" id="secs">--</div>
        <div class="cd-label">Sec</div>
      </div>
    </div>
    <div class="cta-wrap">
      <a href="https://form.gov.sg/69a8e2c13646169c05291a98" target="_blank" class="cta-btn">REGISTER NOW →</a>
    </div>
  </div>

  <!-- Key Dates -->
  <div class="card">
    <div class="event-label">> KEY_DATES</div>
    <div class="event-list">
      <div class="event-row">
        <div class="event-name">QUALIFIERS</div>
        <div class="event-date">16 – 17 MAY 2026</div>
      </div>
      <div class="event-row">
        <div class="event-name">FINALS</div>
        <div class="event-date">10 – 11 JUN 2026</div>
      </div>
    </div>
  </div>

  <!-- Challenges -->
  <div class="card">
    <div class="section-label">> PUZZLES</div>
    <div class="challenge-list">

      <a href="2.html" class="challenge-link">
        <div class="challenge-num">02</div>
        <div class="challenge-info">
          <div class="challenge-name">SIGNAL RECOVERY</div>
        </div>
        <div class="challenge-arrow">›</div>
      </a>

      <a href="1.html" class="challenge-link">
        <div class="challenge-num">01</div>
        <div class="challenge-info">
          <div class="challenge-name">TEST LOGIN</div>
        </div>
        <div class="challenge-arrow">›</div>
      </a>

    </div>
  </div>

  <!-- CTA removed from here, now inside countdown card -->
</div>

<script>
  const TARGET = new Date('2026-05-03T00:00:00+08:00').getTime();

  function pad(n) { return String(n).padStart(2, '0'); }

  function updateCountdown() {
    const now = Date.now();
    let diff = TARGET - now;

    if (diff <= 0) {
      document.getElementById('days').textContent = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('mins').textContent = '00';
      document.getElementById('secs').textContent = '00';
      return;
    }

    const d = Math.floor(diff / 86400000); diff %= 86400000;
    const h = Math.floor(diff / 3600000); diff %= 3600000;
    const m = Math.floor(diff / 60000); diff %= 60000;
    const s = Math.floor(diff / 1000);

    document.getElementById('days').textContent = pad(d);
    document.getElementById('hours').textContent = pad(h);
    document.getElementById('mins').textContent = pad(m);
    document.getElementById('secs').textContent = pad(s);
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);

  const pContainer = document.getElementById('particles');
  function spawnParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    pContainer.appendChild(p);
    setTimeout(() => p.remove(), 20000);
  }
  setInterval(spawnParticle, 600);
  for (let i = 0; i < 8; i++) setTimeout(spawnParticle, i * 200);
</script>

</body>
</html>
